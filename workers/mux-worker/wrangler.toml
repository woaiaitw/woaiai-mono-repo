name = "mux-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8790
inspector_port = 9231

[vars]
WEB_URL = "http://localhost:3000"

[env.production]
name = "mux-worker-production"

[env.production.vars]
WEB_URL = "https://woaiai.tw"

[[env.production.routes]]
pattern = "mux.woaiai.tw"
custom_domain = true
