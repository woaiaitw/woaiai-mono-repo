name = "mux-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8790
inspector_port = 9242

[vars]
ENVIRONMENT = "development"
WEB_URL = "http://localhost:3000"
AUTH_WORKER_URL = "http://localhost:8788"

[[d1_databases]]
binding = "MUX_DB"
database_name = "mux-db"
database_id = "DATABASE_ID_HERE"
migrations_dir = "migrations"

[env.production]
name = "mux-worker-production"

[env.production.vars]
ENVIRONMENT = "production"
WEB_URL = "https://woaiai.tw"
AUTH_WORKER_URL = "https://auth.woaiai.tw"

[[env.production.d1_databases]]
binding = "MUX_DB"
database_name = "mux-db"
database_id = "DATABASE_ID_HERE"
migrations_dir = "migrations"

[[env.production.routes]]
pattern = "mux.woaiai.tw"
custom_domain = true
