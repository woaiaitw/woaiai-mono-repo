name: Deploy

on:
  pull_request:
    types: [opened, synchronize, closed]
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  check:
    name: Typecheck & Test
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  deploy-preview:
    name: Deploy Preview
    needs: check
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Compute preview names and URLs
        id: preview
        run: |
          echo "WEB_NAME=web-pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "AUTH_NAME=auth-worker-pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "RTC_NAME=rtc-worker-pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "DB_NAME=auth-db-pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "WEB_URL=https://web-pr-$PR_NUMBER.woaiaitw.workers.dev" >> "$GITHUB_OUTPUT"
          echo "AUTH_URL=https://auth-worker-pr-$PR_NUMBER.woaiaitw.workers.dev" >> "$GITHUB_OUTPUT"
          echo "RTC_URL=https://rtc-worker-pr-$PR_NUMBER.woaiaitw.workers.dev" >> "$GITHUB_OUTPUT"

      - name: Create D1 database if needed
        run: |
          DB_NAME="${{ steps.preview.outputs.DB_NAME }}"
          # Check if database already exists
          if ! npx wrangler d1 list --json | jq -e ".[] | select(.name == \"$DB_NAME\")" > /dev/null 2>&1; then
            npx wrangler d1 create "$DB_NAME"
          fi
          # Get database ID
          DB_ID=$(npx wrangler d1 list --json | jq -r ".[] | select(.name == \"$DB_NAME\") | .uuid")
          echo "DB_ID=$DB_ID" >> "$GITHUB_ENV"

      - name: Modify auth-worker config for preview
        run: |
          cd workers/auth-worker
          sed -i \
            -e "s/^name = .*/name = \"${{ steps.preview.outputs.AUTH_NAME }}\"/" \
            -e "s/^database_id = .*/database_id = \"$DB_ID\"/" \
            -e "s|^WEB_URL = .*|WEB_URL = \"${{ steps.preview.outputs.WEB_URL }}\"|" \
            -e "s|^BETTER_AUTH_URL = .*|BETTER_AUTH_URL = \"${{ steps.preview.outputs.AUTH_URL }}\"|" \
            wrangler.toml

      - name: Deploy auth-worker
        run: |
          cd workers/auth-worker
          npx wrangler deploy

      - name: Apply D1 migrations
        run: |
          cd workers/auth-worker
          npx wrangler d1 migrations apply AUTH_DB --remote

      - name: Set auth-worker secrets
        run: |
          echo "${{ secrets.BETTER_AUTH_SECRET }}" | npx wrangler secret put BETTER_AUTH_SECRET --name ${{ steps.preview.outputs.AUTH_NAME }}
          echo "${{ secrets.GOOGLE_CLIENT_ID_PREVIEW }}" | npx wrangler secret put GOOGLE_CLIENT_ID --name ${{ steps.preview.outputs.AUTH_NAME }}
          echo "${{ secrets.GOOGLE_CLIENT_SECRET_PREVIEW }}" | npx wrangler secret put GOOGLE_CLIENT_SECRET --name ${{ steps.preview.outputs.AUTH_NAME }}

      - name: Deploy rtc-worker
        run: |
          cd workers/rtc-worker
          npx wrangler deploy \
            --name ${{ steps.preview.outputs.RTC_NAME }} \
            --var WEB_URL:${{ steps.preview.outputs.WEB_URL }}

      - name: Set rtc-worker secrets
        run: |
          echo "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" | npx wrangler secret put CF_ACCOUNT_ID --name ${{ steps.preview.outputs.RTC_NAME }}
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | npx wrangler secret put CF_API_TOKEN --name ${{ steps.preview.outputs.RTC_NAME }}
          echo "${{ secrets.REALTIME_APP_ID }}" | npx wrangler secret put REALTIME_APP_ID --name ${{ steps.preview.outputs.RTC_NAME }}

      - name: Build and deploy web
        env:
          VITE_AUTH_WORKER_URL: ${{ steps.preview.outputs.AUTH_URL }}
          VITE_RTC_WORKER_URL: ${{ steps.preview.outputs.RTC_URL }}
        run: |
          cd apps/web
          npm run build
          npx wrangler deploy \
            --name ${{ steps.preview.outputs.WEB_NAME }} \
            --var AUTH_WORKER_URL:${{ steps.preview.outputs.AUTH_URL }} \
            --var RTC_WORKER_URL:${{ steps.preview.outputs.RTC_URL }}

      - name: Comment PR with preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Preview Deployment',
              '',
              '| Service | URL |',
              '|---------|-----|',
              '| Web | ${{ steps.preview.outputs.WEB_URL }} |',
              '| Auth | ${{ steps.preview.outputs.AUTH_URL }} |',
              '| RTC | ${{ steps.preview.outputs.RTC_URL }} |',
              '',
              '_Deployed from commit ${{ github.sha }}_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy-production:
    name: Deploy Production
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm deploy:production
      - name: Apply production D1 migrations
        run: |
          cd workers/auth-worker
          npx wrangler d1 migrations apply AUTH_DB --env production --remote

  cleanup-preview:
    name: Cleanup Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Delete preview workers
        run: |
          npx wrangler delete --name web-pr-$PR_NUMBER --force || true
          npx wrangler delete --name auth-worker-pr-$PR_NUMBER --force || true
          npx wrangler delete --name rtc-worker-pr-$PR_NUMBER --force || true

      - name: Delete preview D1 database
        run: |
          DB_NAME="auth-db-pr-$PR_NUMBER"
          DB_ID=$(npx wrangler d1 list --json | jq -r ".[] | select(.name == \"$DB_NAME\") | .uuid" || true)
          if [ -n "$DB_ID" ] && [ "$DB_ID" != "null" ]; then
            npx wrangler d1 delete "$DB_ID" --yes || true
          fi
